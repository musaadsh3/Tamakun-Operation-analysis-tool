# Tamakun SaaS – operation.tamakun.sa
# This file (filename prefix "00-") loads before the cPanel-generated user
# vhost (conf.d/users/operationtamakun.conf), so nginx uses this server block
# for the operation.tamakun.sa hostname. The cPanel block remains in effect
# for the service subdomains (www., mail., webmail., cpanel., etc.) it owns.

upstream tamakun_saas_app {
    server unix:/run/tamakun-saas/tamakun-saas.sock fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name operation.tamakun.sa;

    include conf.d/includes-optional/cloudflare.conf;

    # Allow Let's Encrypt http-01 verification (used by cPanel AutoSSL)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /home/operationtamakun/public_html;
    }

    client_max_body_size 25m;

    # Serve directly over HTTP at the origin so Cloudflare in Flexible mode
    # (CF<->origin = HTTP) works without redirect loops. Cloudflare itself
    # enforces HTTPS at the edge for clients.
    location / {
        proxy_pass http://tamakun_saas_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Behind Cloudflare: edge always speaks HTTPS to clients regardless
        # of CF<->origin scheme, so report HTTPS upstream.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name operation.tamakun.sa;

    include conf.d/includes-optional/cloudflare.conf;

    # cPanel AutoSSL-managed certificate (auto-renewed by cPanel)
    ssl_certificate     /var/cpanel/ssl/apache_tls/operation.tamakun.sa/combined;
    ssl_certificate_key /var/cpanel/ssl/apache_tls/operation.tamakun.sa/combined;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 25m;
    client_body_timeout 120s;

    access_log /var/log/nginx/operation.tamakun.sa-access.log main;
    error_log  /var/log/nginx/operation.tamakun.sa-error.log warn;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    proxy_buffering on;
    proxy_request_buffering on;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /home/operationtamakun/public_html;
    }

    location / {
        proxy_pass http://tamakun_saas_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
    }
}
